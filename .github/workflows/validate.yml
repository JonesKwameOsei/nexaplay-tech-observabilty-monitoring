name: Validate Config Files

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Validate docker-compose and Prometheus config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── docker-compose.yml ────────────────────────────────────────────────
      - name: Verify Docker Compose is available
        run: docker compose version

      - name: Validate docker-compose.yml syntax
        run: |
          docker compose -f docker-compose.yml config --quiet
          echo "docker-compose.yml is valid"

      # ── prometheus.yml ────────────────────────────────────────────────────
      - name: Pull Prometheus image (for promtool)
        run: docker pull prom/prometheus:v2.51.2 --quiet

      - name: Validate prometheus.yml with promtool
        run: |
          docker run --rm \
            --entrypoint /bin/promtool \
            -v "${{ github.workspace }}/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v2.51.2 \
            check config /etc/prometheus/prometheus.yml
          echo "prometheus.yml is valid"

      # ── alerts.yml ────────────────────────────────────────────────────────
      - name: Validate alert rules with promtool
        run: |
          docker run --rm \
            --entrypoint /bin/promtool \
            -v "${{ github.workspace }}/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v2.51.2 \
            check rules /etc/prometheus/rules/alerts.yml
          echo "alerts.yml is valid"

      # ── Dashboard JSON ────────────────────────────────────────────────────
      - name: Validate Grafana dashboard JSON
        run: |
          python3 -m json.tool \
            grafana/dashboards/nexaplay-overview.json > /dev/null
          echo "nexaplay-overview.json is valid JSON"
