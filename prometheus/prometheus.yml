global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "rules/alerts.yml"

scrape_configs:
  - job_name: "nexaplay-app"
    scrape_interval: 5s # overrides global settings
    static_configs:
      - targets:
          - app:8000

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: "prometheus"
    static_configs:
      - targets:
          - localhost:9090
