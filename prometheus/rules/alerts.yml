groups:
  - name: nexaplay-alerts
    rules:

      # Fires when the app container is unreachable (no scrape data)
      - alert: ServiceDown
        expr: up{job="nexaplay-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NexaPlay game server is DOWN"
          description: "The nexaplay-app target has been unreachable for more than 1 minute."

      # Fires when 5xx error rate exceeds 5% of total requests for 2 consecutive minutes
      - alert: HighErrorRate
        expr: >
          rate(http_requests_total{status=~"5.."}[1m])
          /
          rate(http_requests_total[1m])
          * 100 > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on NexaPlay"
          description: "5xx error rate has exceeded 5% of total requests for more than 2 minutes."

      # Fires when matchmaking response time p95 exceeds 1 second
      - alert: HighMatchmakingLatency
        expr: >
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{endpoint="/matchmaking/find"}[2m])
          ) > 1.0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Matchmaking latency is high"
          description: "95th percentile matchmaking response time has exceeded 1 second for 1 minute."
